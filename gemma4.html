<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Realistic Flip Clock</title>
    <style>
        body { margin: 0; background-color: #111; overflow: hidden; font-family: sans-serif; }
        #instructions {
            position: absolute; top: 20px; left: 20px; color: white;
            pointer-events: none; text-transform: uppercase; letter-spacing: 2px; font-size: 12px;
        }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="instructions">Click anywhere to enable sound</div>

    <!-- Load Three.js and GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

    <script>
        /**
         * CONFIGURATION
         */
        const COLORS = {
            bg: 0x111111,
            card: 0x222222,
            text: 0xeeeeee,
            edge: 0x000000
        };

        // Audio setup
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playFlipSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        /**
         * TEXTURE GENERATOR
         * Creates a canvas texture for the numbers
         */
        function createNumberTexture(number, isTop) {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');

            // Background
            ctx.fillStyle = '#222';
            ctx.fillRect(0, 0, 256, 256);

            // Text style
            ctx.fillStyle = '#eee';
            ctx.font = 'bold 200px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            // Clip based on top/bottom half
            ctx.save();
            if (isTop) {
                ctx.beginPath();
                ctx.rect(0, 0, 256, 128);
                ctx.clip();
                ctx.fillText(number, 128, 128); // Offset to center the top half
            } else {
                ctx.beginPath();
                ctx.rect(0, 128, 256, 128);
                ctx.clip();
                ctx.fillText(number, 128, 128); // Offset to center the bottom half
            }
            ctx.restore();

            // Add a slight gradient/shadow for realism
            const grad = ctx.createLinearGradient(0, 0, 0, 256);
            grad.addColorStop(0, 'rgba(0,0,0,0.2)');
            grad.addColorStop(0.45, 'rgba(0,0,0,0)');
            grad.addColorStop(0.55, 'rgba(0,0,0,0)');
            grad.addColorStop(1, 'rgba(0,0,0,0.4)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 256, 256);

            const texture = new THREE.CanvasTexture(canvas);
            return texture;
        }

        /**
         * FLIP DIGIT CLASS
         */
        class FlipDigit {
            constructor(positionX) {
                this.group = new THREE.Group();
                this.group.position.x = positionX;
                
                this.currentValue = 0;

                // Materials
                this.matTop = new THREE.MeshPhongMaterial({ map: createNumberTexture('0', true) });
                this.matBottom = new THREE.MeshPhongMaterial({ map: createNumberTexture('0', false) });
                this.matFlapTop = new THREE.MeshPhongMaterial({ map: createNumberTexture('0', true) });
                this.matFlapBottom = new THREE.MeshPhongMaterial({ map: createNumberTexture('0', false) });

                // Meshes
                const geo = new THREE.PlaneGeometry(1, 0.5);
                
                this.topStatic = new THREE.Mesh(geo, this.matTop);
                this.topStatic.position.y = 0.25;

                this.bottomStatic = new THREE.Mesh(geo, this.matBottom);
                this.bottomStatic.position.y = -0.25;

                this.flap = new THREE.Group();
                this.flapTop = new THREE.Mesh(geo, this.matFlapTop);
                this.flapTop.position.y = 0.25;
                this.flapBottom = new THREE.Mesh(geo, this.matFlapBottom);
                this.flapBottom.position.y = -0.25;
                this.flapBottom.rotation.x = Math.PI; // Start flipped
                
                this.flap.add(this.flapTop);
                this.flap.add(this.flapBottom);
                this.flap.position.y = 0;

                this.group.add(this.topStatic);
                this.group.add(this.bottomStatic);
                this.group.add(this.flap);

                // Hinge line
                const hingeGeo = new THREE.PlaneGeometry(1.01, 0.02);
                const hingeMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
                const hinge = new THREE.Mesh(hingeGeo, hingeMat);
                this.group.add(hinge);
            }

            updateValue(newValue) {
                if (newValue === this.currentValue) return;

                const prevValue = this.currentValue;
                this.currentValue = newValue;

                // 1. Setup textures for the animation
                // Static top stays prevValue
                this.matTop.map = createNumberTexture(prevValue, true);
                this.matTop.needsUpdate = true;

                // Static bottom becomes newValue
                this.matBottom.map = createNumberTexture(newValue, false);
                this.matBottom.needsUpdate = true;

                // Flap top starts as prevValue (bottom half)
                this.matFlapTop.map = createNumberTexture(prevValue, false); 
                // Wait, for the flap rotating DOWN: 
                // The flap's front is the bottom half of the OLD number
                this.matFlapTop.map = createNumberTexture(prevValue, false);
                this.matFlapTop.position.y = -0.25; 
                
                // The flap's back is the top half of the NEW number
                this.matFlapBottom.map = createNumberTexture(newValue, true);
                this.matFlapBottom.position.y = 0.25;
                this.matFlapBottom.rotation.x = Math.PI;

                this.flap.rotation.x = 0;

                // 2. Animation
                gsap.to(this.flap.rotation, {
                    x: Math.PI / 2, 
                    duration: 0.6,
                    ease: "expo.inOut",
                    onComplete: () => {
                        // Finalize: Swap static top to newValue
                        this.matTop.map = createNumberTexture(newValue, true);
                        this.matTop.needsUpdate = true;
                        this.flap.rotation.x = 0;
                        playFlipSound();
                    }
                });
            }
        }

        /**
         * SCENE SETUP
         */
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(COLORS.bg);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 6;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const spotLight = new THREE.SpotLight(0xffffff, 1);
        spotLight.position.set(5, 5, 5);
        scene.add(spotLight);

        // Create clock digits
        const digits = [];
        const spacing = 1.2;
        // HH:MM:SS (6 digits)
        for (let i = 0; i < 6; i++) {
            const xPos = (i - 2.5) * spacing;
            const digit = new FlipDigit(xPos);
            scene.add(digit.group);
            digits.push(digit);
        }

        // Add colons
        const colonGeo = new THREE.PlaneGeometry(0.1, 0.2);
        const colonMat = new THREE.MeshBasicMaterial({ color: 0x555555 });
        [2, 4].forEach(idx => {
            const colon = new THREE.Mesh(colonGeo, colonMat);
            colon.position.x = (idx - 2.5) * spacing + (spacing/2);
            scene.add(colon);
        });

        /**
         * TIME UPDATE LOOP
         */
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            const timeStr = h + m + s;

            for (let i = 0; i < 6; i++) {
                digits[i].updateValue(timeStr[i]);
            }
        }

        setInterval(updateClock, 1000);
        updateClock();

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Audio unlock
        window.addEventListener('click', () => {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
                document.getElementById('instructions').style.opacity = '0';
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            // Subtle camera sway
            camera.position.x = Math.sin(Date.now() * 0.0005) * 0.2;
            camera.position.y = Math.cos(Date.now() * 0.0005) * 0.2;
            camera.lookAt(0, 0, 0);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
